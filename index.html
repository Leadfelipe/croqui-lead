<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croqui Lead GF</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.29/"></script>

<style>
html,body{margin:0;height:100%;font-family:Arial;}
#map{height:100%;}
#loading{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  background:#fff;z-index:10;
  font-size:14px;color:#555;
}
#login{
  position:absolute;top:10px;left:10px;z-index:20;
}
button{
  padding:8px 12px;border:none;background:#185FA5;color:#fff;
  cursor:pointer;border-radius:4px;font-weight:bold;
}
</style>
</head>

<body>

<div id="login">
  <button id="btnLogin">🔐 Entrar</button>
</div>

<div id="loading">Aguardando autenticação...</div>
<div id="map"></div>

<script>
require([
  "esri/WebMap",
  "esri/views/MapView",
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
  "esri/portal/Portal"
], function(WebMap, MapView, OAuthInfo, esriId, Portal) {

  const CONFIG = {
    portalUrl: "https://leadgf.maps.arcgis.com",
    webmapId: "5d5ef5a6a71042739973816e388dbd4c",
    appId: "it2vHNbwi9ZItczZ",
    redirectUri: "https://leadfelipe.github.io/croqui-lead/oauth-callback.html"
  };

  const loading = document.getElementById("loading");
  const btnLogin = document.getElementById("btnLogin");

  function show(msg){
    loading.style.display="flex";
    loading.innerHTML=msg;
  }

  function hide(){
    loading.style.display="none";
  }

  function initOAuth(){
    const info = new OAuthInfo({
      appId: CONFIG.appId,
      portalUrl: CONFIG.portalUrl,
      popup: true,
      popupCallbackUrl: CONFIG.redirectUri
    });

    esriId.registerOAuthInfos([info]);
  }

  async function login(){
    try{
      show("Abrindo login...");
      await esriId.getCredential(CONFIG.portalUrl + "/sharing");
      await initMap();
    }catch(e){
      console.error(e);
      show("Erro no login");
    }
  }

  async function initMap(){
    try{
      show("Carregando mapa privado...");

      const portal = new Portal({
        url: CONFIG.portalUrl,
        authMode: "immediate"
      });

      await portal.load();

      const webmap = new WebMap({
        portalItem: { id: CONFIG.webmapId }
      });

      const view = new MapView({
        container: "map",
        map: webmap
      });

      await view.when();

      hide();
      btnLogin.style.display="none";

    }catch(e){
      console.error(e);
      show("Erro ao carregar WebMap");
    }
  }

  async function tryAutoLogin(){
    try{
      const credential = await esriId.checkSignInStatus(CONFIG.portalUrl + "/sharing");
      if(credential){
        await initMap();
      }else{
        show("Clique em Entrar para acessar");
      }
    }catch{
      show("Clique em Entrar para acessar");
    }
  }

  btnLogin.addEventListener("click", login);

  initOAuth();
  tryAutoLogin();

});
</script>

</body>
</html>
