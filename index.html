<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Croqui Lead GF</title>

<link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
<script src="https://js.arcgis.com/4.29/"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
html,body{margin:0;height:100%;font-family:Arial}
#sb{position:fixed;width:260px;height:100%;background:#0e2438;color:#fff;padding:10px;overflow:auto}
#mn{margin-left:260px;height:100%}
#am{height:100%}
#ml{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#fff;z-index:10}
</style>
</head>

<body>

<div id="sb">
  <h3>Croqui Lead GF</h3>
  <div id="ub">Clique para entrar</div>

  <h4>CAMADAS</h4>
  <div id="ll"></div>

  <h4>FILTROS</h4>
  <div id="fs"></div>

  <h4>LEGENDA</h4>
  <div id="lg"></div>

  <button onclick="gerarPDF()">Gerar PDF</button>
</div>

<div id="mn">
  <div id="ml">Carregando...</div>
  <div id="am"></div>
</div>

<script>
require([
  "esri/WebMap",
  "esri/views/MapView",
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager"
], function(WebMap, MapView, OAuthInfo, esriId) {

const PORTAL = "https://leadgf.maps.arcgis.com";
const WEBMAP = "5d5ef5a6a71042739973816e388dbd4c";
const APPID = "it2vHNbwi9ZItczZ";
const REDIRECT = "https://leadfelipe.github.io/croqui-lead/oauth-callback.html";

function setUser(t){document.getElementById("ub").textContent=t}

function register(){
  const info=new OAuthInfo({
    appId:APPID,
    portalUrl:PORTAL,
    popup:true,
    popupCallbackUrl:REDIRECT
  });
  esriId.registerOAuthInfos([info]);
}

async function login(){
  try{
    register();
    await esriId.getCredential(PORTAL+"/sharing");
    await init();
  }catch(e){console.error(e)}
}

async function trySession(){
  try{
    register();
    await esriId.checkSignInStatus(PORTAL+"/sharing");
    await init();
  }catch{
    setUser("Clique para entrar");
    document.getElementById("ub").onclick=login;
  }
}

async function init(){
  try{
    const wm=new WebMap({
      portalItem:{
        id:WEBMAP,
        portal:{url:PORTAL}
      }
    });

    const v=new MapView({
      container:"am",
      map:wm
    });

    await v.when();

    document.getElementById("ml").style.display="none";

    const cred=esriId.credentials?.[0];
    setUser("✓ "+(cred?.userId||"Logado"));

    const layers=wm.allLayers.filter(l=>!["tile","vector-tile"].includes(l.type));

    buildLayers(layers);
    buildFilters(layers);
    buildLegend(layers);

  }catch(e){
    console.error(e);
    document.getElementById("ml").innerHTML="Erro ao carregar mapa";
  }
}

function buildLayers(ls){
  const c=document.getElementById("ll");c.innerHTML="";
  ls.forEach(l=>{
    const d=document.createElement("div");
    const cb=document.createElement("input");
    cb.type="checkbox";cb.checked=l.visible;
    cb.onchange=()=>l.visible=cb.checked;
    d.appendChild(cb);
    d.appendChild(document.createTextNode(" "+l.title));
    c.appendChild(d);
  });
}

function buildFilters(ls){
  const c=document.getElementById("fs");c.innerHTML="";
  ls.forEach(l=>{
    if(!l.fields)return;
    const f=l.fields.find(x=>x.type==="string");
    if(!f)return;

    const sel=document.createElement("select");
    sel.innerHTML="<option>Filtrar "+l.title+"</option>";

    l.queryFeatures({
      where:"1=1",
      outFields:[f.name],
      returnDistinctValues:true
    }).then(r=>{
      r.features.forEach(ft=>{
        const v=ft.attributes[f.name];
        if(v) sel.innerHTML+=`<option>${v}</option>`;
      });
    });

    sel.onchange=()=>l.definitionExpression=`${f.name}='${sel.value}'`;
    c.appendChild(sel);
  });
}

function buildLegend(ls){
  const c=document.getElementById("lg");c.innerHTML="";
  ls.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=l.title;
    c.appendChild(d);
  });
}

window.gerarPDF=async function(){
  if(!window.jspdf||!window.html2canvas){
    alert("Erro PDF");
    return;
  }

  const {jsPDF}=window.jspdf;

  const cv=await html2canvas(document.body);
  const pdf=new jsPDF({orientation:"landscape"});
  pdf.addImage(cv.toDataURL("image/jpeg"),"JPEG",0,0,297,210);
  pdf.save("croqui.pdf");
};

trySession();

});
</script>

</body>
</html>
